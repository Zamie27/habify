services:
  # 1. Container Aplikasi (Backend Laravel 12 & PHP 8.4)
  # Sesuai kebutuhan backend di dokumen [cite: 1586]
  app:
    build:
      context: .
      dockerfile: docker/php/DockerFile
    container_name: habify-app
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "8011:8000"
      - "5184:5184"
    volumes:
      - ./:/var/www/html:Z
    networks:
      - habify-network

  # 2. Web Server (Nginx) - Terpisah dari PHP
  # Melayani request HTTP dan file statis [cite: 1576]
  nginx:
    image: nginx:alpine
    container_name: habify-nginx
    restart: unless-stopped
    ports:
      - "8091:80"
    volumes:
      - ./:/var/www/html:Z
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:Z
    depends_on:
      - app
    networks:
      - habify-network

  # 3. Database Server (MySQL)
  # Tempat penyimpanan terpusat data latihan dan profil atlet [cite: 1541, 1588]
  mysql:
    image: mysql:8.4
    container_name: habify-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: db_habify
      MYSQL_USER: habify_user
      MYSQL_PASSWORD: habify_password
      MYSQL_ROOT_PASSWORD: root_password_habify
    ports:
      - "3318:3316"
    volumes:
      - habify-db-data:/var/lib/mysql:Z
    networks:
      - habify-network

  # 4. Database Management (PHPMyAdmin)
  # Memudahkan tim SI dalam mengelola integritas data [cite: 1660]
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: habify-pma
    restart: always
    ports:
      - "8093:80"
    environment:
      - PMA_ARBITRARY=1
    depends_on:
      - mysql
    networks:
      - habify-network

networks:
  habify-network:
    driver: bridge

volumes:
  habify-db-data:
